<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FAQ | Sahanines Interiors</title>
  <meta name="description" content="Answers to common questions about our interior design services, pricing, timelines, warranty and process.">
  <link rel="canonical" href="https://sahanines.com/faq">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
</head>
<body>
  <div id="site-header"></div>

  <section class="page-hero">
    <div class="container page-hero-content">
      <div class="breadcrumb reveal"><a href="/">Home</a><span>·</span>FAQ</div>
      <h1 class="reveal" data-delay="1">Frequently asked questions.</h1>
      <p class="reveal" data-delay="2">
        Answers to the most common questions from our clients. Still have doubts? WhatsApp us —
        we typically reply within an hour.
      </p>
    </div>
  </section>

  <section class="section">
    <div class="container-narrow">
      <div style="margin-bottom:2rem;">
        <div class="gallery-search" style="max-width:100%;">
          <span>🔍</span>
          <input type="text" id="faqSearch" placeholder="Search FAQs…" aria-label="Search FAQs">
        </div>
      </div>
      <div id="faqList" class="faq-list">
        <div class="spinner"></div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="/js/api.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/main.js"></script>
  <script>
    let allFaqs = [];
    (async () => {
      try {
        const { items } = await API.get('/faqs');
        allFaqs = items;
        renderFaqs(items);
      } catch (err) {
        document.getElementById('faqList').innerHTML = '<p style="color:var(--clr-error);">Failed to load FAQs.</p>';
      }
    })();

    function renderFaqs(items) {
      const list = document.getElementById('faqList');
      if (!items.length) {
        list.innerHTML = '<p style="text-align:center;color:var(--clr-muted);padding:2rem;">No matching FAQs.</p>';
        return;
      }
      list.innerHTML = items.map(f => `
        <div class="faq-item">
          <button class="faq-question">
            ${escapeHtml(f.question)}
            <span class="plus">+</span>
          </button>
          <div class="faq-answer"><p>${escapeHtml(f.answer)}</p></div>
        </div>
      `).join('');
      list.querySelectorAll('.faq-question').forEach(q => {
        q.addEventListener('click', () => q.closest('.faq-item').classList.toggle('open'));
      });
    }

    let searchTimer;
    document.getElementById('faqSearch').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        const q = e.target.value.toLowerCase();
        renderFaqs(allFaqs.filter(f =>
          f.question.toLowerCase().includes(q) || f.answer.toLowerCase().includes(q)
        ));
      }, 200);
    });

    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  </script>
</body>
</html>
